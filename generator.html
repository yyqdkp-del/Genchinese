<!DOCTYPE html>

<html lang="zh">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>汉字拆解生成器 · 根·中文</title>
<link href="https://fonts.googleapis.com/css2?family=Noto+Serif+SC:wght@400;600;700&display=swap" rel="stylesheet">
<style>
* { margin:0; padding:0; box-sizing:border-box; }
body {
  background: #F5F0E8;
  font-family: 'Noto Serif SC', Georgia, serif;
  min-height: 100vh;
  padding: 32px 16px 80px;
  background-image:
    radial-gradient(circle at 15% 15%, rgba(200,160,96,0.1) 0%, transparent 55%),
    radial-gradient(circle at 85% 85%, rgba(192,57,43,0.07) 0%, transparent 55%);
}
.wrap { max-width: 560px; margin: 0 auto; }

/* Header */
.header { text-align: center; margin-bottom: 32px; }
.header-label { font-size: 11px; letter-spacing: 5px; color: #C03A2B; font-family: sans-serif; text-transform: uppercase; margin-bottom: 8px; }
.header h1 { font-size: 26px; font-weight: 700; color: #1A1208; letter-spacing: -0.5px; }
.header p { font-size: 13px; color: #907060; margin-top: 8px; font-family: sans-serif; line-height: 1.7; }

/* Input card */
.input-card {
background: white; border-radius: 20px; padding: 20px 22px;
box-shadow: 0 4px 24px rgba(26,18,8,0.07);
border: 1px solid rgba(200,160,96,0.18);
margin-bottom: 16px;
}
.input-row { display: flex; gap: 10px; align-items: stretch; margin-bottom: 14px; }
#charInput {
width: 72px; text-align: center; font-size: 52px;
border: 2px solid rgba(200,160,96,0.3); border-radius: 12px;
padding: 6px 0; font-family: ‘Noto Serif SC’, serif;
color: #1A1208; background: #FDFBF7; outline: none; flex-shrink: 0;
transition: border-color 0.2s;
}
#charInput:focus { border-color: rgba(192,57,43,0.5); }
#genBtn {
flex: 1; padding: 0 20px; background: #C03A2B; color: white;
border: none; border-radius: 12px; font-size: 16px;
font-family: ‘Noto Serif SC’, serif; cursor: pointer;
letter-spacing: 1px; box-shadow: 0 4px 16px rgba(192,57,43,0.28);
transition: all 0.2s;
}
#genBtn:hover { opacity: 0.88; transform: translateY(-1px); }
#genBtn:disabled { background: #C5B5A5; box-shadow: none; cursor: not-allowed; transform: none; }

.quick-label { font-size: 10px; color: #B09080; letter-spacing: 3px; margin-bottom: 8px; font-family: sans-serif; text-transform: uppercase; }
.chips { display: flex; flex-wrap: wrap; gap: 7px; }
.chip {
width: 38px; height: 38px; background: #FDFBF7;
border: 1.5px solid rgba(200,160,96,0.28); border-radius: 10px;
font-size: 20px; font-family: ‘Noto Serif SC’, serif;
color: #4A3728; cursor: pointer; transition: all 0.2s;
display: flex; align-items: center; justify-content: center;
}
.chip:hover { background: rgba(192,57,43,0.08); border-color: rgba(192,57,43,0.35); }

/* Error */
.error-box {
background: #FFF0EE; border: 1px solid #C03A2B; border-radius: 12px;
padding: 14px 18px; color: #C03A2B; font-size: 14px;
font-family: sans-serif; margin-bottom: 14px;
}

/* Loading */
.loading-box {
background: white; border-radius: 20px; padding: 40px 24px;
text-align: center; box-shadow: 0 4px 24px rgba(26,18,8,0.07);
margin-bottom: 14px;
}
.loading-text { font-size: 13px; color: #B09080; font-family: sans-serif; letter-spacing: 1px; margin-bottom: 16px; }
.dots { display: flex; justify-content: center; gap: 8px; }
.dot {
width: 8px; height: 8px; border-radius: 50%; background: #C8A060;
animation: pulse 1.2s ease-in-out infinite;
}
.dot:nth-child(2) { animation-delay: 0.2s; }
.dot:nth-child(3) { animation-delay: 0.4s; }
@keyframes pulse { 0%,100%{opacity:0.3;transform:scale(0.8)} 50%{opacity:1;transform:scale(1.2)} }

/* Cards */
.card {
background: white; border-radius: 20px; padding: 24px 22px;
box-shadow: 0 4px 24px rgba(26,18,8,0.07);
border: 1px solid rgba(200,160,96,0.13);
margin-bottom: 14px;
}
.card-label {
font-size: 10px; letter-spacing: 3px; color: #C03A2B;
font-family: sans-serif; text-transform: uppercase; margin-bottom: 10px;
}

/* Animation area */
.anim-wrap { text-align: center; min-height: 180px; }
.parts-row {
display: flex; justify-content: center; align-items: flex-start;
gap: 48px; margin-bottom: 16px;
transition: all 0.7s cubic-bezier(0.34,1.56,0.64,1);
}
.part-box {
display: flex; flex-direction: column; align-items: center; gap: 6px;
transition: transform 0.6s cubic-bezier(0.34,1.56,0.64,1);
}
.part-char {
width: 68px; height: 68px; border-radius: 14px;
background: rgba(192,57,43,0.08); border: 2px solid rgba(192,57,43,0.2);
display: flex; align-items: center; justify-content: center;
font-size: 34px; font-family: ‘Noto Serif SC’, serif; color: #C03A2B;
box-shadow: 0 4px 16px rgba(192,57,43,0.1);
}
.part-label { font-size: 11px; color: #907060; text-align: center; max-width: 72px; font-family: sans-serif; }
.anim-arrow {
font-size: 18px; color: #C8A060; margin: 8px 0;
opacity: 0; transition: all 0.5s ease;
font-family: sans-serif;
}
.merged-char {
font-size: 96px; font-family: ‘Noto Serif SC’, serif;
color: #1A1208; line-height: 1;
text-shadow: 0 6px 32px rgba(26,18,8,0.12);
opacity: 0; transform: scale(0.3);
transition: all 0.7s cubic-bezier(0.34,1.56,0.64,1);
}
.badges { display: flex; justify-content: center; gap: 10px; flex-wrap: wrap; margin-top: 18px; }
.badge {
padding: 5px 16px; border-radius: 20px;
font-size: 15px; font-family: sans-serif; letter-spacing: 2px;
background: #FDFBF7; border: 1px solid rgba(200,160,96,0.3); color: #4A3728;
}
.meaning { font-size: 19px; font-weight: 600; color: #1A1208; margin-top: 12px; }
.parts-chips { display: flex; justify-content: center; flex-wrap: wrap; gap: 7px; margin-top: 14px; }
.part-chip {
padding: 7px 14px; background: rgba(192,57,43,0.06); border-radius: 10px;
font-size: 13px; color: #4A3728; font-family: sans-serif;
display: inline-flex; align-items: center; gap: 6px;
}
.part-chip-char { font-size: 18px; font-family: ‘Noto Serif SC’, serif; }
.part-chip-text { color: #907060; }

/* Story scene */
.story-text { font-size: 15px; color: #2C1810; line-height: 1.85; }
.scene-box {
background: rgba(200,160,96,0.08); border-radius: 12px;
padding: 14px 16px; border-left: 3px solid #C8A060; margin-top: 16px;
}
.scene-label { font-size: 10px; letter-spacing: 3px; color: #C8A060; font-family: sans-serif; text-transform: uppercase; margin-bottom: 5px; }
.scene-text { font-size: 14px; color: #4A3728; line-height: 1.75; font-style: italic; }

/* Two col */
.two-col { display: flex; gap: 16px; flex-wrap: wrap; }
.col { flex: 1; min-width: 150px; }
.col-label { font-size: 10px; letter-spacing: 3px; color: #C03A2B; font-family: sans-serif; text-transform: uppercase; margin-bottom: 10px; }
.ext-item { font-size: 13px; color: #4A3728; line-height: 1.9; font-family: sans-serif; }
.chengyu-char { font-size: 20px; font-family: ‘Noto Serif SC’, serif; color: #1A1208; margin-bottom: 5px; }
.chengyu-story { font-size: 12px; color: #907060; font-family: sans-serif; line-height: 1.7; }

/* Mom card */
.mom-card {
background: white; border-radius: 20px;
border: 1.5px solid rgba(200,160,96,0.3);
overflow: hidden; box-shadow: 0 4px 24px rgba(26,18,8,0.06);
margin-bottom: 14px; transition: background 0.3s;
}
.mom-toggle {
width: 100%; padding: 17px 22px; background: none; border: none;
display: flex; align-items: center; justify-content: space-between;
cursor: pointer; text-align: left;
}
.mom-title { font-size: 15px; color: #4A3728; font-family: ‘Noto Serif SC’, serif; font-weight: 600; }
.mom-hint { font-size: 11px; color: #B09080; font-family: sans-serif; margin-top: 2px; }
.mom-arrow { font-size: 20px; color: #C8A060; transition: transform 0.3s; font-style: normal; }
.mom-body { display: none; padding: 0 22px 22px; }
.mom-divider { border-top: 1px solid rgba(200,160,96,0.2); padding-top: 18px; }
.mom-sublabel { font-size: 10px; letter-spacing: 3px; color: #C8A060; font-family: sans-serif; text-transform: uppercase; margin-bottom: 14px; }
.q-row { display: flex; gap: 12px; margin-bottom: 14px; align-items: flex-start; }
.q-num {
width: 26px; height: 26px; border-radius: 50%; background: #C8A060;
color: white; display: flex; align-items: center; justify-content: center;
font-size: 12px; font-family: sans-serif; flex-shrink: 0; margin-top: 3px;
}
.q-text { font-size: 14px; color: #2C1810; line-height: 1.75; font-family: sans-serif; }
.tip-box { margin-top: 16px; background: rgba(192,57,43,0.06); border-radius: 12px; padding: 12px 15px; }
.tip-label { font-size: 10px; letter-spacing: 2px; color: #C03A2B; font-family: sans-serif; margin-bottom: 5px; }
.tip-text { font-size: 12px; color: #4A3728; font-family: sans-serif; line-height: 1.7; }

/* Empty state */
.empty { text-align: center; padding: 50px 20px; color: #B09080; }
.empty-char { font-size: 72px; font-family: ‘Noto Serif SC’, serif; color: rgba(192,57,43,0.12); line-height: 1; margin-bottom: 14px; }
.empty-text { font-size: 13px; font-family: sans-serif; line-height: 1.9; }
.empty-hint { color: #C8A060; }

/* Back link */
.back { text-align: center; margin-bottom: 24px; }
.back a { font-size: 13px; color: #907060; font-family: sans-serif; text-decoration: none; letter-spacing: 1px; }
.back a:hover { color: #C03A2B; }
</style>

</head>
<body>
<div class="wrap">

  <div class="back"><a href="index.html">← 返回根·中文主页</a></div>

  <div class="header">
    <div class="header-label">根·中文 · Gen Chinese</div>
    <h1>汉字拆解生成器</h1>
    <p>自然拼读 × 文化意象 × 清迈场景<br>每天10分钟 · 妈妈不需要备课</p>
  </div>

  <div class="input-card">
    <div class="input-row">
      <input id="charInput" type="text" placeholder="字" maxlength="1"
        oninput="this.value=this.value.slice(-1)"
        onkeydown="if(event.key==='Enter')generate()">
      <button id="genBtn" onclick="generate()">🔍 拆解</button>
    </div>
    <div class="quick-label">快速体验</div>
    <div class="chips">
      <div class="chip" onclick="quick('明')">明</div>
      <div class="chip" onclick="quick('休')">休</div>
      <div class="chip" onclick="quick('森')">森</div>
      <div class="chip" onclick="quick('闻')">闻</div>
      <div class="chip" onclick="quick('家')">家</div>
      <div class="chip" onclick="quick('笑')">笑</div>
      <div class="chip" onclick="quick('飞')">飞</div>
      <div class="chip" onclick="quick('鱼')">鱼</div>
      <div class="chip" onclick="quick('山')">山</div>
      <div class="chip" onclick="quick('水')">水</div>
    </div>
  </div>

  <div id="output">
    <div class="empty">
      <div class="empty-char">字</div>
      <div class="empty-text">
        输入任意汉字，或点击上方快速体验<br>
        <span class="empty-hint">自然拼读 · 文化故事 · 清迈场景 · 妈妈台词</span>
      </div>
    </div>
  </div>

</div>

<script>
const LEVELS = {
  R1:{color:"#922B21",bg:"#FFF0EE",label:"入门"},
  R2:{color:"#BA4A00",bg:"#FFF6EE",label:"基础"},
  R3:{color:"#1E8449",bg:"#EDFAF1",label:"进阶"},
  R4:{color:"#2874A2",bg:"#EBF5FB",label:"提升"},
  R5:{color:"#6C3483",bg:"#F4ECF7",label:"高阶"},
};

let lastChar = '';

function quick(ch) {
  document.getElementById('charInput').value = ch;
  generate();
}

async function generate() {
  const ch = document.getElementById('charInput').value.trim();
  if (!ch) return;
  lastChar = ch;

  const btn = document.getElementById('genBtn');
  const out = document.getElementById('output');

  btn.disabled = true;
  btn.textContent = '生成中…';

  out.innerHTML = `
    <div class="loading-box">
      <div class="loading-text">正在生成「${ch}」的拆解卡片…</div>
      <div class="dots">
        <div class="dot"></div>
        <div class="dot"></div>
        <div class="dot"></div>
      </div>
    </div>`;

  const prompt = `输入汉字：${ch}
返回JSON，格式如下，不要任何额外文字：
{"pinyin":"míng","meaning":"明亮光明","level":"R2","parts":[{"char":"日","name":"太阳","image":"温暖光芒"},{"char":"月","name":"月亮","image":"夜空银光"}],"story":"太阳和月亮一起出现，天地最亮。古人看见天空，造出了这个字。","scene":"清迈夜市的灯笼像月亮，照亮了整条街。","mom_questions":["你能找到这个字的两个部分吗？","为什么太阳月亮在一起会明亮？","清迈哪里最明亮？"],"extension":["明天：今天之后的一天","明白：理解清楚"],"chengyu":"明察秋毫","cy_story":"形容眼睛很厉害，连秋天细细的毛发都看得清楚。"}
现在为「${ch}」生成同样格式的JSON：`;

  try {
    const res = await fetch('https://api.anthropic.com/v1/messages', {
      method: 'POST',
      headers: {
        'Content-Type': 'application/json',
        'anthropic-dangerous-direct-browser-access': 'true'
      },
      body: JSON.stringify({
        model: 'claude-haiku-4-5-20251001',
        max_tokens: 1200,
        system: '只输出JSON对象，不加任何其他文字，不用代码块包裹，直接{开头}结尾。',
        messages: [{ role: 'user', content: prompt }]
      })
    });

    const json = await res.json();
    if (json.error) throw new Error(json.error.message);
    const raw = (json?.content?.[0]?.text || '').trim();
    const m = raw.match(/\{[\s\S]*\}/);
    if (!m) throw new Error('格式错误，请重试');
    const d = JSON.parse(m[0]);
    render(d, ch);

  } catch(e) {
    out.innerHTML = `<div class="error-box">⚠️ ${e.message}</div>`;
  } finally {
    btn.disabled = false;
    btn.textContent = '🔍 拆解';
  }
}

function render(d, ch) {
  const lv = d.level || 'R1';
  const cfg = LEVELS[lv] || LEVELS.R1;
  const parts = d.parts || [];
  const exts = Array.isArray(d.extension) ? d.extension : [d.extension];
  const qs = d.mom_questions || [];

  const partsBoxes = parts.map((p,i) => `
    <div class="part-box" id="pb${i}">
      <div class="part-char">${p.char}</div>
      <div class="part-label">${p.image}</div>
    </div>`).join('');

  const partsChips = parts.map(p => `
    <div class="part-chip">
      <span class="part-chip-char">${p.char}</span>
      <span class="part-chip-text">${p.name} · ${p.image}</span>
    </div>`).join('');

  const extItems = exts.filter(Boolean).map(e =>
    `<div class="ext-item">· ${e}</div>`).join('');

  const qRows = qs.map((q,i) => `
    <div class="q-row">
      <div class="q-num">${i+1}</div>
      <div class="q-text">${q}</div>
    </div>`).join('');

  document.getElementById('output').innerHTML = `

    <!-- 动画卡片 -->
    <div class="card" style="text-align:center;">
      <div class="anim-wrap">
        <div class="parts-row" id="partsRow">${partsBoxes}</div>
        <div class="anim-arrow" id="animArrow">↓ 合而为一</div>
        <div class="merged-char" id="mergedChar">${ch}</div>
      </div>
      <div class="badges">
        <span class="badge">${d.pinyin}</span>
        <span class="badge" style="background:${cfg.bg};border-color:${cfg.color}44;color:${cfg.color};">${lv} · ${cfg.label}</span>
      </div>
      <div class="meaning">${d.meaning}</div>
      <div class="parts-chips">${partsChips}</div>
    </div>

    <!-- 文化故事 -->
    <div class="card">
      <div class="card-label">📖 文化故事</div>
      <div class="story-text">${d.story}</div>
      <div class="scene-box">
        <div class="scene-label">🌴 清迈场景</div>
        <div class="scene-text">${d.scene}</div>
      </div>
    </div>

    <!-- 延伸 + 成语 -->
    <div class="card">
      <div class="two-col">
        <div class="col">
          <div class="col-label">🔤 延伸词汇</div>
          ${extItems}
        </div>
        <div class="col">
          <div class="col-label">🌟 成语</div>
          <div class="chengyu-char">${d.chengyu}</div>
          <div class="chengyu-story">${d.cy_story}</div>
        </div>
      </div>
    </div>

    <!-- 妈妈台词 -->
    <div class="mom-card" id="momCard">
      <button class="mom-toggle" onclick="toggleMom()">
        <div>
          <div class="mom-title">👩 妈妈台词</div>
          <div class="mom-hint" id="momHint">点击展开 · 3个引导问题</div>
        </div>
        <i class="mom-arrow" id="momArrow">⌄</i>
      </button>
      <div class="mom-body" id="momBody">
        <div class="mom-divider">
          <div class="mom-sublabel">自然聊天，不是考试</div>
          ${qRows}
          <div class="tip-box">
            <div class="tip-label">💡 小贴士</div>
            <div class="tip-text">问完后，让孩子用「${ch}」造一个句子。不需要正确，有趣就好。</div>
          </div>
        </div>
      </div>
    </div>

  `;

  // 触发动画
  setTimeout(() => {
    const row = document.getElementById('partsRow');
    const arrow = document.getElementById('animArrow');
    const merged = document.getElementById('mergedChar');
    if (row) row.style.gap = '10px';
    setTimeout(() => {
      if (row) { row.style.opacity = '0'; row.style.transform = 'scale(0.8)'; }
      if (arrow) arrow.style.opacity = '1';
      setTimeout(() => {
        if (merged) { merged.style.opacity = '1'; merged.style.transform = 'scale(1)'; }
      }, 350);
    }, 700);
  }, 200);
}

function toggleMom() {
  const body = document.getElementById('momBody');
  const arrow = document.getElementById('momArrow');
  const hint = document.getElementById('momHint');
  const card = document.getElementById('momCard');
  const open = body.style.display !== 'block';
  body.style.display = open ? 'block' : 'none';
  arrow.style.transform = open ? 'rotate(180deg)' : 'rotate(0deg)';
  hint.textContent = open ? '点击收起' : '点击展开 · 3个引导问题';
  card.style.background = open ? '#FFF9F2' : 'white';
}
</script>

</body>
</html>
